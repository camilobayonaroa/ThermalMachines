name: thermal-machines
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Jupyter
  - jupyterlab>=4.0
  - notebook>=7.0
  - ipykernel
  - ipywidgets>=8.0
  - widgetsnbextension
  # Ciencia / matemáticas
  - numpy>=1.26
  - scipy>=1.11
  - sympy>=1.12
  - pandas>=2.0
  - scikit-learn>=1.3
  # Visualización
  - matplotlib>=3.8
  - plotly>=5.18
  # Grafos
  - graphviz          # binario del sistema
  - python-graphviz   # binding Python
  - networkx>=3.2
  # Termodinámica — CoolProp no está en conda-forge estable, se instala vía pip
  - pip
  - pip:
    - CoolProp>=6.6
